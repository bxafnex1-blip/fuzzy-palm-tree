version: "3.9"
services:
  my-gotty:
    build: .
    hostname: mygotty
    ports:
      - "8989:8080"
    stdin_open: true
    tty: true
    privileged: true              
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun   # CRITICAL: Required for WARP/WireGuard tunnel
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.conf.all.src_valid_mark=1 # CRITICAL: Required for proxy routing
    volumes:
      - ./workspace:/workspace
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1280
