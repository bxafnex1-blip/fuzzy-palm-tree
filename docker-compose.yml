version: "3.9"
services:
  my-gotty:
    build: .
    hostname: mygotty
    ports:
      - "8989:8080"
    stdin_open: true
    tty: true
    privileged: true              # CRITICAL: Allows WARP to create network tunnels
    cap_add:
      - NET_ADMIN                 # CRITICAL: Gives permission to route proxy traffic
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0 # WARP sometimes requires IPv6 enabled to connect
    volumes:
      - ./workspace:/workspace
